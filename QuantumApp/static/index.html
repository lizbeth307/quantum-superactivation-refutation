<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Superactivation Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">⚛</span>
                <h1>Quantum Engine <span>v2.1</span></h1>
            </div>
            <p class="subtitle">Smith-Yard Superactivation Synthesizer</p>
        </header>

        <main>
            <!-- Controls Panel -->
            <section class="panel controls-panel glass">
                <h2>Parameters</h2>
                
                <div class="control-group">
                    <label for="noise-select">Noise Model: <span id="noise-val">Erasure</span></label>
                    <select id="noise-select" class="glow-select">
                        <option value="erasure">Erasure Channel (Smith-Yard)</option>
                        <option value="depolarizing">Depolarizing Channel (White Noise)</option>
                        <option value="amplitude_damping">Amplitude Damping (Energy Loss)</option>
                        <option value="phase_damping">Phase Damping (Dephasing)</option>
                        <option value="black_hole">Black Hole (Dephrasure)</option>
                        <option value="wormhole">Wormhole (Two Black Holes)</option>
                        <option value="ppt_channel">PPT Channel (The Impossible Test)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="topology-select">Engine Topology: <span id="topology-val">Bipartite</span></label>
                    <select id="topology-select">
                        <option value="bipartite">Bipartite (N ⊗ PPT)</option>
                        <option value="tripartite">Tripartite Borromean (N ⊗ PPT ⊗ PPT)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="objective-select">Optimization Objective: <span id="objective-val">Capacity</span></label>
                    <select id="objective-select">
                        <option value="capacity">Quantum Capacity (Coherent Info)</option>
                        <option value="metrology">Metrology (Fisher Info)</option>
                        <option value="retrocausality">Time Machine P-CTC (Retrocausal Fidelity)</option>
                        <option value="additivity_violation">Additivity Violation (The Holy Grail)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="dim-slider">Dimension (d): <span id="dim-val">4</span></label>
                    <input type="range" id="dim-slider" min="2" max="16" step="1" value="4">
                </div>
                
                <div class="control-group">
                    <label for="energy-slider">Energy Limit (Photons): <span id="energy-val">MAX</span></label>
                    <input type="range" id="energy-slider" min="0.1" max="15.0" step="0.1" value="15.0">
                </div>
                
                <div class="control-group">
                    <label for="prob-slider">Noise Probability (p): <span id="prob-val">0.35</span></label>
                    <input type="range" id="prob-slider" min="0" max="1" step="0.01" value="0.35">
                </div>
                
                <div class="control-group">
                    <label for="epochs-slider">Epochs: <span id="epochs-val">1000</span></label>
                    <input type="range" id="epochs-slider" min="100" max="5000" step="100" value="1000">
                </div>
                
                <div class="control-group toggle-group">
                    <label for="ancilla-toggle">Deep Quantum Search (Ancilla)</label>
                    <label class="switch">
                        <input type="checkbox" id="ancilla-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                
                <button id="start-btn" class="glow-btn">Initialize Synthesis</button>
                <button id="stop-btn" class="glow-btn danger" disabled>Halt Engine</button>
                <button id="pysr-btn" class="glow-btn" style="margin-top: 10px; background: linear-gradient(45deg, #ff00ff, #00f0ff); border-color: transparent;">Extract Formula (PySR)</button>
            </section>

            <!-- Status Panel -->
            <section class="panel status-panel glass">
                <h2>Telemetry</h2>
                <div class="metrics">
                    <div class="metric">
                        <span class="label">Coherent Info (I_c)</span>
                        <span class="value highlight" id="ic-display">0.00000</span>
                    </div>
                    <div class="metric">
                        <span class="label">NPT Penalty</span>
                        <span class="value" id="npt-display">0.00e+00</span>
                    </div>
                    <div class="metric">
                        <span class="label">TP Penalty</span>
                        <span class="value" id="tp-display">0.00e+00</span>
                    </div>
                    <div class="metric">
                        <span class="label">Epoch</span>
                        <span class="value" id="epoch-display">0 / 0</span>
                    </div>
                </div>
                
                <div class="console-box">
                    <div id="console-output" class="console">
                        > Quantum Engine Standby. Awaiting parameters.
                    </div>
                </div>
            </section>

            <!-- Chart Panel -->
            <section class="panel chart-panel glass">
                <h2>Convergence Trajectory</h2>
                <div class="chart-container">
                    <canvas id="icChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
